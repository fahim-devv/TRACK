<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Location Sharing</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f6f9; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        button { border: none; padding: 12px 25px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; width: 100%; max-width: 200px;}
        .btn-start { background: #28a745; color: white; }
        .btn-start:hover { background: #218838; }
        .btn-stop { background: #dc3545; color: white; display: none; } /* Hidden until tracking starts */
        .btn-stop:hover { background: #c82333; }
        #status { margin-top: 20px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Location Control</h2>
    <p>Manage your live location broadcast stream below.</p>
    
    <button id="startBtn" class="btn-start" onclick="shareLiveLocation()">Start Tracking</button>
    <button id="stopBtn" class="btn-stop" onclick="stopLiveLocation()">Turn Off Location</button>
    
    <div id="status">Status: Disconnected</div>
</div>

<script>
    let watchId = null; // Stores the active GPS tracking ID instance

    function shareLiveLocation() {
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        if (!navigator.geolocation) {
            statusText.innerText = "Error: Geolocation unsupported.";
            return;
        }

        statusText.innerText = "Locating... Please allow permission request.";

        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        // Start watching the position and save the ID reference
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const data = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    acc: position.coords.accuracy,
                    timestamp: new Date().toLocaleTimeString()
                };

                statusText.innerHTML = `<span style="color: #28a745;">✔ LIVE: Streaming Coordinates</span>`;
                
                // Swap buttons visually
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                
                // Send payload
                localStorage.setItem('live_target_gps', JSON.stringify(data)); 
            },
            (error) => {
                statusText.innerText = "Error tracking location: " + error.message;
            }, 
            options
        );
    }

    function stopLiveLocation() {
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        if (watchId !== null) {
            // Effectively kills the active browser GPS sensor call
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            
            // Completely wipe the stored coordinate package data channel
            localStorage.removeItem('live_target_gps');
            
            // Revert state indicators back to default
            statusText.innerHTML = `<span style="color: #dc3545;">❌ Stopped: Location Offline</span>`;
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            
            console.log("GPS data stream cleared completely.");
        }
    }
</script>
</body>
</html>
