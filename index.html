<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Tracker Node</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f6f9; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        input { width: 80%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        button { border: none; padding: 12px 25px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .btn-start { background: #007bff; color: white; }
        .btn-stop { background: #dc3545; color: white; display: none; }
        #status { margin-top: 20px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Device Connection</h2>
    <input type="text" id="deviceName" placeholder="Enter Device Name (e.g., Phone 1)">
    <br>
    <button id="startBtn" class="btn-start" onclick="startTracking()">Connect Device</button>
    <button id="stopBtn" class="btn-stop" onclick="stopTracking()">Disconnect</button>
    <div id="status">Status: Offline</div>
</div>

<script>
    let watchId = null;
    let currentId = "";

    function startTracking() {
        const nameInput = document.getElementById('deviceName');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        currentId = nameInput.value.trim();
        if (!currentId) {
            alert("Please enter a device name first!");
            return;
        }

        nameInput.disabled = true;
        statusText.innerText = "Locating hardware GPS...";

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const telemetry = {
                    id: currentId,
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    acc: position.coords.accuracy,
                    timestamp: new Date().toLocaleTimeString()
                };

                statusText.innerHTML = `<span style="color: green;">✔ Active streaming as: ${currentId}</span>`;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';

                // Store unique packet per device ID
                localStorage.setItem(`gps_device_${currentId}`, JSON.stringify(telemetry));
            },
            (error) => { statusText.innerText = "GPS Error: " + error.message; },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    function stopTracking() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            localStorage.removeItem(`gps_device_${currentId}`);
            
            document.getElementById('deviceName').disabled = false;
            document.getElementById('status').innerHTML = "Status: Disconnected";
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
        }
    }
</script>
</body>
</html>
