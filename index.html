<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permanent Background Tracker Node</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f6f9; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        input { width: 80%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        button { border: none; padding: 12px 25px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .btn-start { background: #007bff; color: white; }
        #status { margin-top: 20px; color: #666; font-size: 14px; font-weight: bold; }
        .locked-info { color: #555; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
    </style>
    <!-- Firebase Legacy SDK Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="card">
    <h2>Background Tracker</h2>
    <div id="nameSection">
        <input type="text" id="deviceName" placeholder="Enter Device Name">
    </div>
    <div id="lockedNameDisplay" class="locked-info" style="display: none;"></div>
    
    <button id="startBtn" class="btn-start" onclick="initTracking()">Connect & Allow Background</button>
    <div id="status">Status: Offline</div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDCeJ00BT0ODn34gwzkE3U8vHyDe1dVz5o",
        authDomain: "tracker-38206.firebaseapp.com",
        databaseURL: "https://tracker-38206-default-rtdb.firebaseio.com",
        projectId: "tracker-38206",
        storageBucket: "tracker-38206.firebasestorage.app",
        messagingSenderId: "393055696899",
        appId: "1:393055696899:web:44cf6722231a8d62867636"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentId = "";
    let watchId = null;

    window.onload = function() {
        // Register Service Worker for better background persistence
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then((reg) => {
                    console.log("Background Service Worker Registered Successfully.", reg);
                })
                .catch((err) => {
                    console.error("Service Worker Registration Failed:", err);
                });
        }

        const savedName = localStorage.getItem('saved_tracker_name');
        if (savedName) {
            currentId = savedName;
            lockUI(savedName);
            startBackgroundTracking();
        }
    };

    function lockUI(name) {
        document.getElementById('nameSection').style.display = 'none';
        document.getElementById('lockedNameDisplay').style.display = 'block';
        document.getElementById('lockedNameDisplay').innerHTML = `Registered Device: <span style="color:#007bff;">${name}</span>`;
        document.getElementById('startBtn').style.display = 'none';
    }

    function initTracking() {
        const nameInput = document.getElementById('deviceName');
        currentId = nameInput.value.trim();
        if (!currentId) { 
            alert("Please enter a valid device name!"); 
            return; 
        }
        
        localStorage.setItem('saved_tracker_name', currentId);
        lockUI(currentId);
        startBackgroundTracking();
    }

    function startBackgroundTracking() {
        if (!navigator.geolocation) {
            document.getElementById('status').innerText = "Error: Geolocation not supported by this browser.";
            return;
        }

        document.getElementById('status').innerText = "Locating GPS (Establishing streams)...";

        const geoOptions = {
            enableHighAccuracy: true,
            timeout: 5000, 
            maximumAge: 0
        };

        // Clear existing watch instance if running
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
        }

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const telemetry = {
                    id: currentId,
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    acc: position.coords.accuracy,
                    timestamp: new Date().toLocaleTimeString()
                };

                document.getElementById('status').innerHTML = `<span style="color: green;">✔ Live Streaming Active</span>`;
                
                // Write directly to your real-time cloud endpoint
                database.ref('devices/' + currentId).set(telemetry)
                    .catch(err => console.error("Database sync failed:", err));
            },
            (error) => { 
                console.warn(`Geolocation error (${error.code}): ${error.message}`);
                document.getElementById('status').innerHTML = `<span style="color: orange;">Seeking signal... (${error.message})</span>`;
            },
            geoOptions
        );
    }
</script>
</body>
</html>
